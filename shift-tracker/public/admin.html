<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Админ-панель — Учёт смен</title>
<link rel="icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="style.css" />
<style>
  body { user-select: text; }
  #app { align-items: stretch; justify-content: flex-start; padding: 16px; }
  .admin-card { max-width: 1000px; margin: 0 auto; width: 100%; background: var(--card); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px; border-bottom: 1px solid var(--border); }
  th { color: var(--muted); font-weight: 500; }
  input, select { background: #0f172a; border: 1px solid var(--border); color: var(--text); padding: 8px; border-radius: 8px; font-size: 14px; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: end; }
  .toolbar .field { margin: 0; }
  .toolbar label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  .btn-sm { padding: 6px 12px; font-size: 13px; border-radius: 8px; border: none; cursor: pointer; margin: 0; width: auto; display: inline-block; }
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tabs button { flex: none; }
  .tabs button.active { background: var(--accent); }
  h2 { margin-top: 0; }
</style>
</head>
<body>
<div id="app"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="admin.js"></script>
</body>
</html>
